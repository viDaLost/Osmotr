<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Осмотр модели</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #e0e0e0; /* Приятный серый фон */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            /* Убираем стандартную рамку при клике */
            outline: none;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="Untitled.glb" 
        camera-controls 
        shadow-intensity="1.5"
        shadow-softness="1"
        environment-image="neutral"
        auto-rotate>
    </model-viewer>

</body>
</html>
